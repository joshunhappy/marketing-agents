# America Voice — Integration Registry
# Source: AmericaVoice_DataSourceAudit.xlsx (Phase 1 audit)
# Tracks every data source the agent pipeline reads from or writes to.
# Status values: connected | not_started | blocked
# Auth values: api_key | oauth2 | unknown
# Access values: read_only | write_only | read_write

integrations:

  # ── CRM & SALES ──────────────────────────────────────────────────────────
  crm_salesforce_hubspot:
    label: "HubSpot / Salesforce"
    category: crm_sales
    sub_category: crm
    api_available: true
    auth: api_key
    access: read_write
    status: not_started
    used_by: [lead_generation, customer_engagement]
    gaps: "Export lead list format; confirm field mapping"
    env_key: CRM_API_KEY

  apollo:
    label: "Apollo.io"
