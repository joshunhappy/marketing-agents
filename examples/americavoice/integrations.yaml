    priority: high
    owner: marketing_ops
    due: "Week 1"
    action: "Obtain MCC account access or sub-account credentials"

  - tool: meta_ads
    priority: high
    owner: marketing_ops
    due: "Week 1"
    action: "Confirm Business Manager admin rights for agent OAuth"

  - tool: semrush_ahrefs
    priority: medium
    owner: marketing_ops
    due: "Week 1"
    action: "Confirm plan tier supports API access (Business plan required)"

  - tool: notion
    priority: high
    owner: ai_ops_owner
    due: "Week 1"
    action: "Upload brand voice doc and define agent read permissions"

  - tool: linkedin_sales_nav
    priority: high
    owner: marketing_ops
    due: "Week 2"
    action: "Pursue LinkedIn partner agreement for API access"

  - tool: crm_salesforce_hubspot
    priority: high
    owner: marketing_ops
    due: "Week 2"
    action: "Map CRM lead fields to agent input schema"

  - tool: av_app_backend
    priority: high
    owner: engineering_lead
    due: "Week 3"
    action: "Define data access policy and schema for customer transaction history"

  - tool: moneygram_dealer_data
    priority: medium
