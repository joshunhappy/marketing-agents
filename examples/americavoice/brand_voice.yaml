# Brand Voice Guidelines
# Source: AmericaVoice-BrandVoiceGuide.docx (2026)
# Used by the Content Creation and Customer Engagement agents to stay on-brand.

brand:
  name: "America Voice"
  tagline: "Connecting families and friends across borders — making distance feel smaller"
  founded: "16+ years ago"
  description: >
    B2C fintech and telecom service enabling migrants in the US and Canada to send
    mobile top-ups, gift cards, and international recharges to family across 100+ countries.
    Works with 200+ global carriers including Tigo, Claro, Movistar, Telcel, and Digicel.
  distribution:
    - "App (iOS & Android)"
    - "Website"
    - "5,000+ dealer locations across the US"

tone:
  primary: warm
  secondary: [clear, reliable, empowering, approachable]
  avoid: [corporate_jargon, formal, stiff, fear_based, guilt_based, shame_based]
  pillars:
    warm: "Speak with heart. Customers aren't transactions — they're people who miss their families."
    clear: "No jargon. No hidden fees language. No complexity. Make things easy to understand."
    reliable: "Confident and consistent — never overpromising. Say what you mean."
    empowering: "Celebrate the act of sending. Help customers feel good about what they're doing."

style:
  sentence_length: short          # aim for under 20 words per sentence
  reading_level: accessible       # bilingual/Spanish-dominant audience
  point_of_view: second_person    # "you" language
  oxford_comma: true
  language_default: english       # use English unless campaign target is explicitly Spanish-speaking
  bilingual_note: >
    When producing Spanish-language content, use neutral Latin American Spanish.
    Avoid regional slang. Respect the cultural weight of 'familia'. Never mix
    English and Spanish in the same sentence unless it's an intentional cultural choice.

content_principles:
  - Lead every message with an emotional or human benefit before the technical feature
  - One clear CTA per message — never more
  - Use customer's first name in email and push notifications when available
  - Reference specific countries (Mexico, Guatemala, El Salvador, etc.) when personalizing
  - Copy should always feel human — never like it was generated by AI

channel_tone:
  email:
    tone: warm, personal, conversational
    notes: "Use first name. Short sentences. One clear CTA per email."
  social_media:
    tone: upbeat, celebratory, bilingual
    notes: "Mix English/Spanish. Use emojis sparingly. Focus on family stories."
  paid_ads:
    tone: direct, benefit-led, urgent
    notes: "Lead with the benefit. End with a clear action. Avoid fine print language."
  push_notifications:
    tone: crisp, timely, action-driven
    notes: "Max 10 words. Trigger on behavior. Never send more than 1 per day."
  blog_seo:
    tone: helpful, educational, empathetic
    notes: "Answer real questions migrants search for. Avoid SEO stuffing."

messaging_by_goal:
  lead_generation:
    emphasis: "REACH and EASE — how fast and simple it is to get started"
    sample_headlines:
      - "Send a top-up to Guatemala in under 60 seconds."
      - "Your family deserves to stay connected. We make it easy."
      - "Join 1 million families staying connected with America Voice."
      - "Zero fees. Zero delays. Just connection."
  conversion:
    emphasis: "Reduce hesitation — address trust, security, and simplicity"
    sample_headlines:
      - "Trusted for 16 years. Secure every time."
      - "Pay with credit card, PayPal, or cash at 5,000+ locations."
      - "First top-up? We walk you through every step."
      - "Your payment is protected. Their phone gets charged instantly."
  retention_upsell:
    emphasis: "Celebrate loyalty, introduce new value (gift cards, data packages, calling plans)"
    sample_headlines:
      - "You've sent 10 top-ups. Thank you for keeping your family connected."
      - "New: Send a gift card along with your top-up. Double the love."
      - "Unlimited calls to Guatemala for just a fixed monthly fee."
      - "Your family's in 3 countries? One account covers all of them."

glossary:
  preferred:
    "Top-up / Recharge": "not 'Remittance / Transfer' — more familiar and less formal"
    "Family / Loved ones": "not 'Recipients / End users' — reflects emotional reality"
    "Send / Recharge": "not 'Process / Execute / Transact' — human, action-oriented verbs"
    "America Voice": "not 'AV / The platform / The app' — always use the full brand name"

prohibited:
  words: [leverage, synergy, utilize, onboarding_flow, enterprise-grade, recipients,
          end_users, initiate, remittance_transaction, multi-step_verification_workflow]
  claims:
    - "Do not mention specific pricing without confirmation from the marketing team"
    - "Do not promise delivery speed (e.g. 'instant') unless confirmed"
  tactics: [fear, guilt, shame]

do_examples:
  - "Send love home in seconds."
  - "Your family's phone is about to light up."
  - "Fast, safe, and no hidden fees."
  - "We've been connecting families for 16 years."
  - "Recharge in 3 easy steps."
  - "They'll never miss a call from you."

dont_examples:
  - "Initiate an international remittance transaction."
  - "The recipient will receive a mobile recharge."
  - "Subject to applicable terms and conditions."
  - "Our enterprise-grade platform ensures reliability."
  - "Complete the multi-step verification workflow."
  - "Maximize communication uptime for your contacts."
